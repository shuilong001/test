<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0,minimum-scale=1.0, viewport-fit=cover, user-scalable=no"
      name="viewport"
    />
    <!--ios和Android都支持-->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!--仅Android支持-->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-touch-fullscreen" content="yes" />
    <meta name="x5-orientation" content="portrait" />
    <meta name="x5-fullscreen" content="true" />
    <meta name="msapplication-TileColor" content="#f6d2d2" />
    <!-- Apple Touch 图标 (iOS) -->
    <link rel="apple-touch-icon" href="/pwa/logo_192x192.png" />
    <script>
      ;(function () {
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
        const setting = localStorage.getItem('vueuse-color-scheme') || 'auto'
        if (setting === 'dark' || (prefersDark && setting !== 'light'))
          document.documentElement.classList.toggle('dark', true)
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <noscript> This website requires JavaScript to function properly. Please enable JavaScript to continue. </noscript>
  </body>
</html>
